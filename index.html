<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbeitszeit</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #111827;
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1 {
      text-align: center;
      margin: 0 0 20px;
      font-size: 30px;
    }

    .status-box {
      background: #f3f4f6;
      border-radius: 22px;
      padding: 22px;
      text-align: center;
      margin-bottom: 22px;
      min-height: 180px;
      transition: .2s;
    }

    .green { background: #dcfce7; }
    .yellow { background: #fef9c3; }
    .red { background: #fee2e2; }

    .label {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .big-time {
      font-size: 48px;
      font-weight: 800;
      margin: 8px 0;
    }

    .info {
      font-size: 16px;
      line-height: 1.5;
      color: #374151;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 17px;
      margin-top: 12px;
      font-size: 18px;
      font-weight: 700;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button.secondary { background: #374151; }
    button.danger { background: #dc2626; }
    button.success { background: #16a34a; }

    button:active { transform: scale(.98); }

    .hint {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Arbeitszeit</h1>

    <div class="status-box" id="box">
      <div id="ausgabe">
        <div class="label">Status</div>
        <div class="info">Noch nicht eingestempelt.</div>
      </div>
    </div>

    <button onclick="einstempeln()">Einstempeln</button>
    <button class="secondary" onclick="pauseStart()">Pause beginnen</button>
    <button class="secondary" onclick="pauseEnde()">Pause beenden</button>
    <button onclick="status()">Status aktualisieren</button>
    <button class="success" onclick="feierabend()">Feierabend-Check</button>
    <button class="danger" onclick="reset()">Neuer Tag</button>

    <div class="hint">Maximal 10 Stunden Netto-Arbeitszeit</div>
  </div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

function zeit(t) {
  return new Date(t).toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function dauer(ms) {
  let minuten = Math.max(0, Math.floor(ms / 60000));
  let h = Math.floor(minuten / 60);
  let m = minuten % 60;
  if (h <= 0) return m + " Min.";
  return h + " Std. " + m + " Min.";
}

function setBox(status) {
  let box = document.getElementById("box");
  box.className = "status-box " + status;
}

function ausgabe(html) {
  document.getElementById("ausgabe").innerHTML = html;
}

function einstempeln() {
  let jetzt = Date.now();
  localStorage.setItem("start", jetzt);
  localStorage.setItem("pause", 0);
  localStorage.removeItem("pauseStart");
  status();
}

function pauseStart() {
  let start = Number(localStorage.getItem("start"));
  if (!start) return alert("Du musst dich zuerst einstempeln.");

  let jetzt = Date.now();
  localStorage.setItem("pauseStart", jetzt);

  setBox("yellow");
  ausgabe(`
    <div class="label">Pause läuft seit</div>
    <div class="big-time">${zeit(jetzt)}</div>
    <div class="info">Nach der Pause auf „Pause beenden“ drücken.</div>
  `);
}

function pauseEnde() {
  let ps = Number(localStorage.getItem("pauseStart"));
  if (!ps) return alert("Du hast keine Pause gestartet.");

  let minuten = Math.round((Date.now() - ps) / 60000);
  let gesamt = Number(localStorage.getItem("pause") || 0) + minuten;

  localStorage.setItem("pause", gesamt);
  localStorage.removeItem("pauseStart");
  status();
}

function status() {
  let start = Number(localStorage.getItem("start"));
  if (!start) {
    setBox("");
    ausgabe(`
      <div class="label">Status</div>
      <div class="info">Noch nicht eingestempelt.</div>
    `);
    return;
  }

  let pause = Number(localStorage.getItem("pause") || 0);
  let ende = start + (10 * 60 + pause) * 60000;
  let rest = ende - Date.now();

  let farbe = "green";
  if (rest <= 60 * 60 * 1000) farbe = "yellow";
  if (rest <= 0) farbe = "red";
  setBox(farbe);

  ausgabe(`
    <div class="label">Spätestens gehen</div>
    <div class="big-time">${zeit(ende)}</div>
    <div class="info">
      Arbeitsbeginn: ${zeit(start)}<br>
      Pause: ${pause} Minuten<br>
      Verbleibend: ${rest > 0 ? dauer(rest) : "überschritten"}
    </div>
  `);
}

function feierabend() {
  let start = Number(localStorage.getItem("start"));
  if (!start) return alert("Du hast dich noch nicht eingestempelt.");

  let pause = Number(localStorage.getItem("pause") || 0);
  let netto = Date.now() - start - pause * 60000;
  let max = 10 * 60 * 60000;

  let ok = netto <= max;
  setBox(ok ? "green" : "red");

  ausgabe(`
    <div class="label">Feierabend-Check</div>
    <div class="big-time">${dauer(netto)}</div>
    <div class="info">
      Netto-Arbeitszeit<br>
      ${ok ? "Alles im Rahmen." : "10 Stunden überschritten!"}
    </div>
  `);
}

function reset() {
  if (!confirm("Neuen Arbeitstag starten und alle Zeiten löschen?")) return;
  localStorage.clear();
  status();
}

window.onload = function() {
  status();
  setInterval(status, 60000);
};
</script>
</body>
</html>
